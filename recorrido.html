<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="Mapa interactivo del recorrido histórico por la Carrera Séptima de Bogotá." />
  <title>Recorrido — La Séptima: Ayer y Hoy</title>

  <!-- Estilos principales -->
  <link rel="stylesheet" href="style.css" />

  <!-- ============================================================
       ESTILOS ESPECÍFICOS DEL INFOWINDOW (Google Maps inyecta en <head>)
       ============================================================ -->
  <style>
    /* Anula estilos por defecto del InfoWindow de Google Maps */
    .gm-style .gm-style-iw-c {
      padding: 0 !important;
      border-radius: 0 !important;
      box-shadow: 0 6px 28px rgba(30,26,20,0.5) !important;
      border: 2px solid #c8a84b !important;
      max-width: 300px !important;
    }
    .gm-style .gm-style-iw-d {
      overflow: hidden !important;
      padding: 0 !important;
    }
    .gm-style .gm-style-iw-t::after {
      background: #c8a84b !important;
    }
    /* Botón de cierre del InfoWindow */
    .gm-style .gm-ui-hover-effect {
      top: 4px !important;
      right: 4px !important;
      opacity: 0.6;
    }
    .gm-style .gm-ui-hover-effect img {
      filter: invert(1);
    }
  </style>
</head>

<body class="recorrido-body">

  <!-- ============================================================
       BARRA SUPERIOR DE NAVEGACIÓN
       ============================================================ -->
  <nav class="map-topbar" role="navigation" aria-label="Navegación del mapa">

    <div class="topbar-title">
      La Séptima: <span>Ayer y Hoy</span>
    </div>

    <div class="topbar-nav">

      <!-- Botón: activar/desactivar marcadores -->
      <button
        id="btn-toggle"
        class="topbar-btn topbar-btn--toggle"
        aria-label="Mostrar u ocultar puntos históricos"
        title="Activar / Desactivar puntos">
        <span>👁</span>
        <span>Ocultar Puntos</span>
      </button>

      <!-- Botón: volver al inicio -->
      <a
        href="index.html"
        class="topbar-btn topbar-btn--home"
        aria-label="Volver a la página de inicio"
        title="Inicio">
        <span>←</span>
        <span>Inicio</span>
      </a>

    </div>
  </nav>

  <!-- ============================================================
       ÁREA PRINCIPAL DEL MAPA
       ============================================================ -->
  <div class="map-wrapper">

    <!-- Contenedor del mapa (Google Maps se adjunta aquí) -->
    <div id="map" role="application" aria-label="Mapa interactivo de la Carrera Séptima"></div>

    <!-- Panel lateral con lista de puntos históricos -->
    <aside id="side-panel" class="side-panel" aria-label="Lista de puntos históricos">

      <div class="side-panel-header">
        <span class="side-panel-title">📍 Puntos del Recorrido</span>
        <button id="btn-panel-close" class="panel-close" aria-label="Cerrar panel">✕</button>
      </div>

      <!-- La lista se genera dinámicamente desde main.js -->
      <div id="panel-list" class="panel-list" role="list"></div>

    </aside>

    <!-- Botón flotante para abrir el panel lateral -->
    <button
      id="btn-panel"
      class="fab-panel"
      aria-label="Ver lista de puntos históricos"
      title="Lista de puntos">
      ☰ Lista de Puntos
    </button>

  </div>

  <!-- ============================================================
       SCRIPTS
       ============================================================ -->

  <!-- 1. Datos de los puntos históricos (debe cargarse antes de main.js) -->
  <script src="puntos.js"></script>

  <!-- 2. Lógica principal del mapa -->
  <script src="main.js"></script>

  <!--
    3. Google Maps JavaScript API
    ─────────────────────────────────────────────────────────────
    ⚠️  IMPORTANTE PARA DEPLOYMENT EN GITHUB PAGES:
    Reemplaza "TU_API_KEY_AQUI" con tu clave real de la API de Google Maps.

    Pasos:
    1. Ve a https://console.cloud.google.com/
    2. Crea un proyecto o selecciona uno existente.
    3. Activa la "Maps JavaScript API".
    4. En "Credenciales", crea una API Key.
    5. Restringe la key a tu dominio de GitHub Pages:
       https://TU_USUARIO.github.io/*
    6. Sustituye TU_API_KEY_AQUI por tu clave.

    Ejemplo del script con tu key:
    <script async defer
      src="https://maps.googleapis.com/maps/api/js?key=AIzaSy...&callback=initMap">
    </script>
    ─────────────────────────────────────────────────────────────
  -->
 <script async defer
    src="https://maps.googleapis.com/maps/api/js?key=AIzaSyCxyoS1q03vlv5M0g1GI2xAXUEQry4l6ho&callback=initMap&language=es&region=CO">
  </script>

</body>
</html>
